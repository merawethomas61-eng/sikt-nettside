
[functions.stripe-webhook]
enabled = true
verify_jwt = false
import_map = "./functions/stripe-webhook/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/stripe-webhook/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/stripe-webhook/*.html" ]

# Anmeldelser Fase 2 — review-motor.
# send-review-request: kalt fra dashbordet med brukerens JWT (verifiserer eier).
[functions.send-review-request]
enabled = true
verify_jwt = true

# review-redirect: offentlig lenke kunden klikker i e-posten → MÅ være false.
[functions.review-redirect]
enabled = true
verify_jwt = false

# review-followup: kjøres av pg_cron med x-cron-secret → MÅ være false.
[functions.review-followup]
enabled = true
verify_jwt = false

# google-reviews: kalt fra dashbordet med brukerens JWT (leser ekte Google-data).
[functions.google-reviews]
enabled = true
verify_jwt = true

# gbp-reviews: OAuth-callback (GET, ingen JWT) + POST-handlinger (JWT i koden) → false.
[functions.gbp-reviews]
enabled = true
verify_jwt = false

# resend-webhook: offentlig webhook fra Resend (Svix-signatur i koden) → false.
[functions.resend-webhook]
enabled = true
verify_jwt = false

# admin-health: eier-only helse-oversikt, kalt fra nettleseren → false så CORS-
# preflight (OPTIONS) slipper gjennom; JWT + eier-sjekk gjøres i koden.
[functions.admin-health]
enabled = true
verify_jwt = false

# outreach-unsubscribe: offentlig avmeldings-lenke i outreach-e-post → MÅ være false.
[functions.outreach-unsubscribe]
enabled = true
verify_jwt = false

# weekly-reports: kjøres av pg_cron. Deployet med verify_jwt = true — cron-jobben
# sender en Authorization: Bearer-header i tillegg til x-cron-secret, så platt-
# formens JWT-sjekk passerer. IKKE endre til false uten å vite hvorfor: verdien
# her må speile prod, ellers flipper en naiv redeploy oppførselen.
[functions.weekly-reports]
enabled = true
verify_jwt = true

# scan-pagespeed: kalles fra frontend med bruker-JWT (gratis analyse bruker
# anon-key som Bearer, som også passerer). Deployet med verify_jwt = true.
[functions.scan-pagespeed]
enabled = true
verify_jwt = true

# track-lead: offentlig beacon fra kundenes nettsider (henvendelses-sporing);
# lead_token i body ER autorisasjonen, svarer alltid 204 → MÅ være false.
[functions.track-lead]
enabled = true
verify_jwt = false

# google-oauth-callback: Googles OAuth-redirect (GET, ingen JWT) → MÅ være false.
[functions.google-oauth-callback]
enabled = true
verify_jwt = false

# scan-search-console: kalles fra dashbordet; CORS-preflight (OPTIONS) må slippe
# gjennom, JWT verifiseres i koden → false (speiler deployet verdi).
[functions.scan-search-console]
enabled = true
verify_jwt = false